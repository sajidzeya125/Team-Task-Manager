{% extends "base.html" %}
{% block title %}Projects{% endblock %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4">Projects</h1>
    <a class="btn btn-primary" href="/projects/new">New Project</a>
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="projects-body">
          <tr>
            <td colspan="3" class="text-center text-muted py-4">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadProjects() {
      const token = localStorage.getItem("access_token");
      const tbody = document.getElementById("projects-body");

      if (!token) {
        window.location.href = "/login";
        return;
      }

      const res = await fetch("/api/projects/", {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (!res.ok) {
        tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-4">Failed to load projects</td></tr>`;
        return;
      }

      const projects = await res.json();

      if (projects.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted py-4">No projects yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = projects.map(p => `
        <tr>
          <td>${p.name}</td>
          <td>${p.description ?? ""}</td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-primary" href="/projects/${p.id}">View</a>
          </td>
        </tr>
      `).join("");
    }

    loadProjects();
  </script>
{% endblock %}
